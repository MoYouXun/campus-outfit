server:
  port: 8080

spring:
  # 允许循环依赖
  main:
    allow-circular-references: true
  
  # MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_outfit?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0

  # MinIO配置
  minio:
    endpoint: http://localhost:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucketName: campus-outfit

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰命名
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 第三方服务配置
api:
  qweather:
    key: ${QWEATHER_KEY:}
  doubao:
    key: ${DOUBAO_KEY:}
    endpoint-lite: ${DOUBAO_ENDPOINT_LITE:}
    endpoint-mini: ${DOUBAO_ENDPOINT_MINI:}
    endpoint-seedream: ${DOUBAO_ENDPOINT_SEEDREAM:}
    base-url: https://ark.cn-beijing.volces.com/api/v3
  volcengine:
    ak: ${VOLCENGINE_AK:}
    sk: ${VOLCENGINE_SK:}

# AI 引擎配置 (Ark/Seedream)
ai:
  ark:
    ak: ${ARK_AK:}
    sk: ${ARK_SK:}
    model-id: doubao-seedream-241028
    
# 系统业务配置
app:
  jwt:
    expire-time: 604800000 # 7天
    secret: ${JWT_SECRET:CampusOutfitSuperSecretKeyForJwtAuthenticationWhichNeedsToBeLongEnough}
  ranking:
    hot-weight:
      like: 1.0
      comment: 1.5